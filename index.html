    <script>
        fetch("resources/data/authors.json")
            .then(res => res.json())
            .then(authors => {
                const container = document.getElementById("creatorList");

                Object.entries(authors).forEach(([name, data]) => {
                    const role = data.mainRole || data.defaultRole || "Contributor";

                    const card = document.createElement("div");
                    card.className = "creator-card";
                    card.innerHTML = `
                    <img src="${data.avatar}" alt="${name}">
                    <div class="creator-info">
                        <span class="creator-name">${name}</span>
                        <span class="creator-role">${role}</span>
                    </div>
                    <a href="${data.discord}" target="_blank" class="discord-btn-small"></a>
                `;
                    container.appendChild(card);
                });
            });
    </script>
